<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsPilot 配置中心</title>
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- WangEditor 富文本编辑器 -->
    <script src="https://cdn.jsdelivr.net/npm/@wangeditor/editor@5.1.23/dist/index.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/@wangeditor/editor@5.1.23/dist/css/style.min.css" rel="stylesheet">
    <style>
        /* Toast 通知样式 */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
        .toast {
            padding: 12px 20px;
            margin-bottom: 10px;
            border-radius: 8px;
            color: white;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }
        .toast.success { background-color: #10b981; }
        .toast.error { background-color: #ef4444; }
        .toast.warning { background-color: #f59e0b; }

        /* 拖拽排序样式 */
        .sortable-ghost {
            opacity: 0.4;
            background: #e0e7ff;
        }
        .sortable-chosen {
            background: #dbeafe;
        }
        .sortable-drag {
            cursor: grabbing;
        }

        /* TinyMCE 编辑器容器 */
        .editor-container {
            min-height: 200px;
        }

        /* 加载状态 */
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-indicator {
            display: none;
        }

        /* 侧边栏高亮 */
        .nav-item.active {
            background-color: #eff6ff;
            border-left: 3px solid #3b82f6;
            color: #3b82f6;
        }

        /* 标签样式 */
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            margin: 2px;
            background: #e5e7eb;
            border-radius: 4px;
            font-size: 0.875rem;
        }
        .tag .remove {
            margin-left: 4px;
            cursor: pointer;
            color: #6b7280;
        }
        .tag .remove:hover {
            color: #ef4444;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-lg {
            max-width: 600px;
        }
        .modal-xl {
            max-width: 700px;
        }
        .excel-columns-scroll {
            max-height: 320px;
            overflow-y: auto;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        danger: '#ef4444',
                        success: '#10b981',
                        warning: '#f59e0b'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Toast 容器 -->
    <div class="toast-container" id="toast-container"></div>

    <div class="flex h-screen">
        <!-- 侧边栏 -->
        <aside class="w-64 bg-white shadow-lg">
            <div class="p-4 border-b">
                <h1 class="text-xl font-bold text-gray-800">OpsPilot</h1>
                <p class="text-sm text-gray-500">配置中心</p>
            </div>
            <nav class="p-2">
                <a href="/" class="nav-item block px-4 py-2 rounded hover:bg-gray-100 text-gray-700" data-tab="overview">
                    <span class="mr-2">📊</span> 概览
                </a>
                <a href="/chapters" class="nav-item block px-4 py-2 rounded hover:bg-gray-100 text-gray-700" data-tab="chapters">
                    <span class="mr-2">📑</span> 章节排序
                </a>
                <a href="/actions" class="nav-item block px-4 py-2 rounded hover:bg-gray-100 text-gray-700" data-tab="actions">
                    <span class="mr-2">⚙️</span> 操作类型
                </a>
                <a href="/columns" class="nav-item block px-4 py-2 rounded hover:bg-gray-100 text-gray-700" data-tab="columns">
                    <span class="mr-2">📋</span> 列映射
                </a>
                <hr class="my-2">
                <a href="/backups" class="nav-item block px-4 py-2 rounded hover:bg-gray-100 text-gray-700" data-tab="backups">
                    <span class="mr-2">🔄</span> 版本回滚
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="flex-1 overflow-auto">
            <!-- 顶部工具栏 -->
            <header class="bg-white shadow px-6 py-4 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-gray-800" id="page-title">配置中心</h2>
                <div class="flex gap-2">
                    <button onclick="previewYaml()" class="px-4 py-2 border rounded hover:bg-gray-50 text-gray-700">
                        预览 YAML
                    </button>
                    <button onclick="saveAllConfig()" class="px-4 py-2 bg-primary text-white rounded hover:bg-blue-600">
                        保存配置
                    </button>
                </div>
            </header>

            <!-- 内容区域 -->
            <div class="p-6" id="main-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- YAML 预览模态框 -->
    <div id="yaml-modal" class="modal-overlay hidden">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold">YAML 预览</h3>
                <button onclick="closeYamlModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>
            <pre id="yaml-content" class="bg-gray-100 p-4 rounded overflow-auto max-h-96 text-sm font-mono"></pre>
        </div>
    </div>

    <!-- 确认模态框 -->
    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-content p-6">
            <h3 class="text-lg font-semibold mb-4" id="confirm-title">确认操作</h3>
            <p class="text-gray-600 mb-6" id="confirm-message"></p>
            <div class="flex justify-end gap-2">
                <button onclick="closeConfirmModal()" class="px-4 py-2 border rounded hover:bg-gray-50">取消</button>
                <button onclick="confirmAction()" class="px-4 py-2 bg-danger text-white rounded hover:bg-red-600">确认</button>
            </div>
        </div>
    </div>

    <!-- 全局脚本 -->
    <script>
        // Toast 通知
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // YAML 预览
        function previewYaml() {
            fetch('/api/config')
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        // 简单的 YAML 格式化（实际生产中应使用 js-yaml 库）
                        const yaml = JSON.stringify(data.data, null, 2);
                        document.getElementById('yaml-content').textContent = yaml;
                        document.getElementById('yaml-modal').classList.remove('hidden');
                    } else {
                        showToast(data.error, 'error');
                    }
                })
                .catch(err => showToast('加载配置失败', 'error'));
        }

        function closeYamlModal() {
            document.getElementById('yaml-modal').classList.add('hidden');
        }

        // 保存配置
        function saveAllConfig() {
            showToast('配置已保存', 'success');
        }

        // 确认对话框
        let confirmCallback = null;

        function showConfirm(title, message, callback) {
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-message').textContent = message;
            document.getElementById('confirm-modal').classList.remove('hidden');
            confirmCallback = callback;
        }

        function closeConfirmModal() {
            document.getElementById('confirm-modal').classList.add('hidden');
            confirmCallback = null;
        }

        function confirmAction() {
            if (confirmCallback) confirmCallback();
            closeConfirmModal();
        }

        // API 请求封装
        async function apiRequest(url, method = 'GET', data = null) {
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' }
            };
            if (data) options.body = JSON.stringify(data);
            const res = await fetch(url, options);
            return res.json();
        }

        // 设置当前激活的导航项
        function setActiveNav(tab) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.tab === tab) {
                    item.classList.add('active');
                }
            });
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
