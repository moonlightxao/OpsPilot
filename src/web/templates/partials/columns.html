<div class="space-y-6">
    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">Sheet 列映射配置</h3>
            <div class="flex gap-2">
                <div id="batch-mappings-bar" class="hidden flex items-center gap-2 mr-2">
                    <span class="text-sm text-gray-500">已选择 <span id="mappings-selected-count">0</span> 项</span>
                    <button onclick="batchDeleteMappings()" id="batch-delete-mappings-btn" class="px-3 py-1 bg-danger text-white text-sm rounded hover:bg-red-600">
                        批量删除
                    </button>
                </div>
                <button onclick="syncCoreFields()" id="sync-core-fields-btn" class="px-4 py-2 bg-orange-500 text-white rounded hover:bg-orange-600">
                    同步到核心字段
                </button>
                <button onclick="showBatchSaveModal()" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
                    Excel 一键保存
                </button>
                <button onclick="showExcelIdentifyModal()" class="px-4 py-2 border rounded hover:bg-gray-50">
                    Excel 辅助识别
                </button>
                <button onclick="showAddSheetModal()" class="px-4 py-2 bg-primary text-white rounded hover:bg-blue-600">
                    + 新增 Sheet 映射
                </button>
            </div>
        </div>
        <p class="text-gray-500 text-sm mb-4">配置各 Sheet 的列名映射，支持别名匹配。勾选后可批量删除。</p>
        <div id="mappings-list" class="space-y-4">
            <p class="text-gray-500">加载中...</p>
        </div>
    </div>
</div>

<div id="sheet-modal" class="modal-overlay hidden">
    <div class="modal-content p-6 modal-xl">
        <h3 class="text-lg font-semibold mb-4" id="sheet-modal-title">新增 Sheet 映射</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Sheet 名称 *</label>
                <input type="text" id="sheet-name" class="w-full border rounded px-3 py-2" placeholder="如：数据库脚本部署">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">输出列（逗号分隔）</label>
                <input type="text" id="sheet-columns" class="w-full border rounded px-3 py-2" placeholder="如：脚本名称,执行顺序,数据库,执行人,备注">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">列名映射（每行一个：标准列名=别名1,别名2）</label>
                <textarea id="sheet-mapping" class="w-full border rounded px-3 py-2 h-32" placeholder="脚本名称=脚本名称,任务名,任务名称&#10;执行顺序=执行顺序,顺序,序号"></textarea>
            </div>
        </div>
        <div class="flex justify-end gap-2 mt-6">
            <button onclick="closeSheetModal()" class="px-4 py-2 border rounded hover:bg-gray-50">取消</button>
            <button onclick="saveSheetMapping()" class="px-4 py-2 bg-primary text-white rounded hover:bg-blue-600">保存</button>
        </div>
    </div>
</div>

<!-- Excel 辅助识别弹窗 -->
<div id="excel-identify-modal" class="modal-overlay hidden">
    <div class="modal-content p-6 modal-lg">
        <h3 class="text-lg font-semibold mb-4">Excel 辅助识别</h3>
        <p class="text-gray-500 text-sm mb-4">上传 Excel 文件，自动识别所有 Sheet 的列名（点击列名可复制）。</p>
        <input type="file" id="excel-identify-file" accept=".xlsx,.xls" class="w-full border rounded px-3 py-2 mb-4">
        <div id="excel-identify-result" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-2">识别到的列名：</label>
            <div id="excel-identify-list" class="space-y-4 excel-columns-scroll max-h-96 overflow-y-auto"></div>
        </div>
        <div class="flex justify-end gap-2 mt-6">
            <button onclick="closeExcelIdentifyModal()" class="px-4 py-2 border rounded hover:bg-gray-50">关闭</button>
        </div>
    </div>
</div>

<!-- Excel 一键保存弹窗 -->
<div id="batch-save-modal" class="modal-overlay hidden">
    <div class="modal-content p-6 modal-xl">
        <h3 class="text-lg font-semibold mb-4">Excel 一键保存</h3>
        <p class="text-gray-500 text-sm mb-4">上传 Excel 文件，一键将所有 Sheet 的列映射和章节排序保存到配置文件。</p>
        
        <input type="file" id="batch-save-file" accept=".xlsx,.xls" class="w-full border rounded px-3 py-2 mb-4">
        
        <div id="batch-save-preview" class="hidden">
            <h4 class="font-medium mb-3">预览</h4>
            <div id="sheets-preview-list" class="space-y-3 max-h-80 overflow-y-auto"></div>
            
            <div class="mt-4 p-3 bg-blue-50 rounded text-sm">
                <p class="font-medium text-blue-800">保存规则：</p>
                <ul class="mt-1 text-blue-700 list-disc list-inside">
                    <li>所有 Sheet 的列映射将被自动创建/更新</li>
                    <li>第一个 Sheet（实施总表）不会添加到章节排序</li>
                    <li>其他 Sheet 如不存在于章节排序，将自动添加</li>
                    <li>新增章节的优先级将自动递增</li>
                </ul>
            </div>
        </div>
        
        <div class="flex justify-end gap-2 mt-6">
            <button onclick="closeBatchSaveModal()" class="px-4 py-2 border rounded hover:bg-gray-50">取消</button>
            <button id="btn-batch-save" onclick="executeBatchSave()" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                保存到配置
            </button>
        </div>
    </div>
</div>

<script>
    let mappingsData = {};
    let editingSheet = null;
    let batchSaveData = null;
    let selectedMappings = new Set();

    document.addEventListener('DOMContentLoaded', function() { 
        loadMappings(); 
        setActiveNav('columns');
        
        document.getElementById('batch-save-file').addEventListener('change', handleBatchSaveFile);
        document.getElementById('excel-identify-file').addEventListener('change', handleExcelIdentifyFile);
    });

    async function loadMappings() {
        try {
            const res = await apiRequest('/api/config/sheet-column-mapping');
            if (res.success) { mappingsData = res.data; renderMappings(); }
            else { showToast('加载列映射失败', 'error'); }
        } catch (err) { showToast('加载列映射失败', 'error'); }
    }

    function renderMappings() {
        const container = document.getElementById('mappings-list');
        const entries = Object.entries(mappingsData);
        if (entries.length === 0) { 
            container.innerHTML = '<p class="text-gray-500 text-center py-4">暂无 Sheet 映射配置，点击「Excel 一键保存」快速导入</p>'; 
            return; 
        }
        container.innerHTML = entries.map(([name, config]) => {
            const isSelected = selectedMappings.has(name);
            return `
                <div class="border rounded-lg p-4 ${isSelected ? 'ring-2 ring-primary bg-blue-50' : ''}">
                    <div class="flex items-start gap-3">
                        <input type="checkbox" class="mt-1" ${isSelected ? 'checked' : ''} 
                               onchange="toggleMappingSelection('${name}')">
                        <div class="flex-1">
                            <span class="font-medium">${name}</span>
                            <p class="text-sm text-gray-600 mt-1">输出列: ${(config.columns || []).join(', ')}</p>
                            <div class="mt-2 flex flex-wrap gap-1">
                                ${Object.entries(config.column_mapping || {}).map(([col, aliases]) => 
                                    `<span class="tag">${col}: ${aliases.slice(0, 2).join(', ')}${aliases.length > 2 ? '...' : ''}</span>`
                                ).join('')}
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editSheet('${name}')" class="text-primary hover:text-blue-700">编辑</button>
                            <button onclick="deleteSheet('${name}')" class="text-danger hover:text-red-700">删除</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // 切换选择状态
    function toggleMappingSelection(name) {
        if (selectedMappings.has(name)) {
            selectedMappings.delete(name);
        } else {
            selectedMappings.add(name);
        }
        updateBatchMappingsUI();
        renderMappings();
    }

    // 更新批量操作 UI
    function updateBatchMappingsUI() {
        const count = selectedMappings.size;
        const bar = document.getElementById('batch-mappings-bar');
        const countEl = document.getElementById('mappings-selected-count');
        
        if (count > 0) {
            bar.classList.remove('hidden');
            countEl.textContent = count;
        } else {
            bar.classList.add('hidden');
        }
    }

    // 批量删除
    function batchDeleteMappings() {
        const count = selectedMappings.size;
        if (count === 0) return;
        
        const names = Array.from(selectedMappings);
        showConfirm('批量删除确认', `确定要删除选中的 ${count} 个 Sheet 列映射吗？此操作不可撤销。`, async () => {
            try {
                const res = await apiRequest('/api/config/sheet-column-mapping/batch-delete', 'POST', {
                    sheet_names: names
                });
                if (res.success) {
                    showToast(`已删除 ${res.deleted.length} 个 Sheet 列映射`, 'success');
                    selectedMappings.clear();
                    updateBatchMappingsUI();
                    loadMappings();
                } else {
                    showToast(res.error || '删除失败', 'error');
                }
            } catch (err) {
                showToast('删除失败', 'error');
            }
        });
    }

    function showAddSheetModal() {
        editingSheet = null;
        document.getElementById('sheet-modal-title').textContent = '新增 Sheet 映射';
        document.getElementById('sheet-name').value = '';
        document.getElementById('sheet-columns').value = '';
        document.getElementById('sheet-mapping').value = '';
        document.getElementById('sheet-name').disabled = false;
        document.getElementById('sheet-modal').classList.remove('hidden');
    }

    function closeSheetModal() { document.getElementById('sheet-modal').classList.add('hidden'); }

    function editSheet(name) {
        const config = mappingsData[name];
        if (!config) return;
        editingSheet = name;
        document.getElementById('sheet-modal-title').textContent = '编辑 Sheet 映射';
        document.getElementById('sheet-name').value = name;
        document.getElementById('sheet-name').disabled = true;
        document.getElementById('sheet-columns').value = (config.columns || []).join(', ');
        const mappingLines = Object.entries(config.column_mapping || {}).map(([col, aliases]) => `${col}=${aliases.join(',')}`);
        document.getElementById('sheet-mapping').value = mappingLines.join('\n');
        document.getElementById('sheet-modal').classList.remove('hidden');
    }

    async function saveSheetMapping() {
        const name = document.getElementById('sheet-name').value.trim();
        if (!name) { showToast('请输入 Sheet 名称', 'error'); return; }
        const columnsStr = document.getElementById('sheet-columns').value.trim();
        const columns = columnsStr ? columnsStr.split(',').map(c => c.trim()).filter(c => c) : [];
        const mappingStr = document.getElementById('sheet-mapping').value.trim();
        const columnMapping = {};
        if (mappingStr) {
            mappingStr.split('\n').forEach(line => {
                const [col, aliasesStr] = line.split('=').map(s => s.trim());
                if (col && aliasesStr) {
                    columnMapping[col] = aliasesStr.split(',').map(a => a.trim()).filter(a => a);
                }
            });
        }
        const sheetConfig = { columns, column_mapping: columnMapping };
        try {
            const res = await apiRequest(`/api/config/sheet-column-mapping/${encodeURIComponent(name)}`, 'PUT', sheetConfig);
            if (res.success) { showToast('Sheet 映射保存成功', 'success'); closeSheetModal(); loadMappings(); }
            else { showToast(res.error || '保存失败', 'error'); }
        } catch (err) { showToast('保存失败', 'error'); }
    }

    function deleteSheet(name) {
        showConfirm('删除 Sheet 映射', `确定要删除 "${name}" 的列映射吗？`, async () => {
            try {
                const res = await apiRequest(`/api/config/sheet-column-mapping/${encodeURIComponent(name)}`, 'DELETE');
                if (res.success) { 
                    showToast('Sheet 映射已删除', 'success'); 
                    selectedMappings.delete(name);
                    updateBatchMappingsUI();
                    loadMappings(); 
                }
                else { showToast(res.error || '删除失败', 'error'); }
            } catch (err) { showToast('删除失败', 'error'); }
        });
    }

    // ========== Excel 辅助识别 ==========
    
    function showExcelIdentifyModal() {
        document.getElementById('excel-identify-modal').classList.remove('hidden');
        document.getElementById('excel-identify-file').value = '';
        document.getElementById('excel-identify-result').classList.add('hidden');
    }

    function closeExcelIdentifyModal() { 
        document.getElementById('excel-identify-modal').classList.add('hidden'); 
    }

    async function handleExcelIdentifyFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        try {
            showToast('正在解析...', 'info');
            const res = await fetch('/api/upload/excel', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) {
                document.getElementById('excel-identify-result').classList.remove('hidden');
                const container = document.getElementById('excel-identify-list');
                if (data.sheets) {
                    container.innerHTML = Object.entries(data.sheets).map(([sheetName, columns]) => `
                        <div class="border-b pb-3 mb-3 last:border-b-0">
                            <div class="font-medium text-primary mb-2">📄 ${sheetName} (${columns.length} 列)</div>
                            <div class="flex flex-wrap gap-2">
                                ${columns.map(col =>
                                    `<span class="tag cursor-pointer" onclick="navigator.clipboard.writeText('${col}'); showToast('已复制: ${col}')">${col}</span>`
                                ).join('')}
                            </div>
                        </div>
                    `).join('');
                }
            } else { showToast(data.error || '解析失败', 'error'); }
        } catch (err) { showToast('上传失败', 'error'); }
    }

    // ========== Excel 一键保存 ==========
    
    function showBatchSaveModal() {
        batchSaveData = null;
        document.getElementById('batch-save-modal').classList.remove('hidden');
        document.getElementById('batch-save-file').value = '';
        document.getElementById('batch-save-preview').classList.add('hidden');
        document.getElementById('btn-batch-save').disabled = true;
    }

    function closeBatchSaveModal() { 
        document.getElementById('batch-save-modal').classList.add('hidden'); 
    }

    async function handleBatchSaveFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const formData = new FormData();
        formData.append('file', file);
        
        try {
            showToast('正在解析 Excel...', 'info');
            const res = await fetch('/api/upload/excel/preview', { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.success) {
                batchSaveData = data;
                renderBatchSavePreview(data);
                document.getElementById('batch-save-preview').classList.remove('hidden');
                document.getElementById('btn-batch-save').disabled = false;
            } else {
                showToast(data.error || '解析失败', 'error');
            }
        } catch (err) {
            showToast('上传失败: ' + err.message, 'error');
        }
    }

    function renderBatchSavePreview(data) {
        const container = document.getElementById('sheets-preview-list');
        const existingChapters = data.current_priority_rules || [];
        
        container.innerHTML = data.sheets.map(sheet => {
            const isFirst = sheet.is_first_sheet;
            const exists = existingChapters.includes(sheet.name);
            
            let statusBadge = '';
            let statusText = '';
            
            if (isFirst) {
                statusBadge = '<span class="px-2 py-1 text-xs bg-gray-100 text-gray-600 rounded">第一个 Sheet</span>';
                statusText = '仅更新列映射';
            } else if (exists) {
                statusBadge = '<span class="px-2 py-1 text-xs bg-blue-100 text-blue-600 rounded">已存在</span>';
                statusText = '更新列映射';
            } else {
                const nextPriority = data.max_priority + 10;
                statusBadge = '<span class="px-2 py-1 text-xs bg-green-100 text-green-600 rounded">新增</span>';
                statusText = `将新增到章节排序（优先级: ${nextPriority}）`;
            }
            
            return `
                <div class="border rounded-lg p-4 ${isFirst ? 'bg-gray-50' : ''}">
                    <div class="flex items-start justify-between mb-2">
                        <div class="flex items-center gap-2">
                            <span class="font-medium">${sheet.name}</span>
                            ${statusBadge}
                        </div>
                        <span class="text-sm text-gray-500">${sheet.columns.length} 列</span>
                    </div>
                    <p class="text-sm text-gray-600 mb-2">${statusText}</p>
                    <div class="flex flex-wrap gap-1">
                        ${sheet.columns.slice(0, 6).map(col => `<span class="tag text-xs">${col}</span>`).join('')}
                        ${sheet.columns.length > 6 ? `<span class="text-xs text-gray-400">+${sheet.columns.length - 6} 更多</span>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    async function executeBatchSave() {
        if (!batchSaveData || !batchSaveData.sheets) {
            showToast('请先上传 Excel 文件', 'error');
            return;
        }
        
        const btn = document.getElementById('btn-batch-save');
        btn.disabled = true;
        btn.textContent = '保存中...';
        
        try {
            const res = await apiRequest('/api/config/batch-save', 'POST', {
                sheets: batchSaveData.sheets
            });
            
            if (res.success) {
                const updated = res.updated || {};
                const mappingCount = (updated.sheet_column_mapping || []).length;
                const chapterCount = (updated.priority_rules || []).length;
                
                showToast(`保存成功！更新 ${mappingCount} 个列映射，新增 ${chapterCount} 个章节`, 'success');
                closeBatchSaveModal();
                loadMappings();
            } else {
                showToast(res.error || '保存失败', 'error');
            }
        } catch (err) {
            showToast('保存失败: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = '保存到配置';
        }
    }

    // ========== 核心字段同步 ==========
    
    async function syncCoreFields() {
        const btn = document.getElementById('sync-core-fields-btn');
        btn.disabled = true;
        btn.textContent = '同步中...';
        
        try {
            const res = await apiRequest('/api/config/sync-core-fields', 'POST');
            
            if (res.success) {
                const data = res.data || {};
                if (data.synced_count > 0) {
                    showToast(`已同步 ${data.synced_count} 个核心字段`, 'success');
                    // 如果有新增别名，在控制台显示详情
                    if (data.new_aliases && Object.keys(data.new_aliases).length > 0) {
                        const details = Object.entries(data.new_aliases)
                            .map(([field, aliases]) => `${field}: ${aliases.join(', ')}`)
                            .join('\n');
                        console.log('新增别名:\n' + details);
                    }
                } else {
                    showToast('无需同步，所有列名已存在于核心字段中', 'info');
                }
            } else {
                showToast(res.error || '同步失败', 'error');
            }
        } catch (err) {
            showToast('同步失败: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = '同步到核心字段';
        }
    }
</script>
