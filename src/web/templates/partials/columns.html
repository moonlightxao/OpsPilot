<div class="space-y-6">
    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">Sheet 列映射配置</h3>
            <div class="flex gap-2">
                <button onclick="showExcelUploadModal()" class="px-4 py-2 border rounded hover:bg-gray-50">
                    Excel 辅助识别
                </button>
                <button onclick="showAddSheetModal()" class="px-4 py-2 bg-primary text-white rounded hover:bg-blue-600">
                    + 新增 Sheet 映射
                </button>
            </div>
        </div>
        <p class="text-gray-500 text-sm mb-4">配置各 Sheet 的列名映射，支持别名匹配。</p>
        <div id="mappings-list" class="space-y-4">
            <p class="text-gray-500">加载中...</p>
        </div>
    </div>
</div>

<div id="sheet-modal" class="modal-overlay hidden">
    <div class="modal-content p-6" style="max-width: 700px;">
        <h3 class="text-lg font-semibold mb-4" id="sheet-modal-title">新增 Sheet 映射</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Sheet 名称 *</label>
                <input type="text" id="sheet-name" class="w-full border rounded px-3 py-2" placeholder="如：数据库脚本部署">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">输出列（逗号分隔）</label>
                <input type="text" id="sheet-columns" class="w-full border rounded px-3 py-2" placeholder="如：脚本名称,执行顺序,数据库,执行人,备注">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">列名映射（每行一个：标准列名=别名1,别名2）</label>
                <textarea id="sheet-mapping" class="w-full border rounded px-3 py-2 h-32" placeholder="脚本名称=脚本名称,任务名,任务名称&#10;执行顺序=执行顺序,顺序,序号"></textarea>
            </div>
        </div>
        <div class="flex justify-end gap-2 mt-6">
            <button onclick="closeSheetModal()" class="px-4 py-2 border rounded hover:bg-gray-50">取消</button>
            <button onclick="saveSheetMapping()" class="px-4 py-2 bg-primary text-white rounded hover:bg-blue-600">保存</button>
        </div>
    </div>
</div>

<div id="excel-upload-modal" class="modal-overlay hidden">
    <div class="modal-content p-6">
        <h3 class="text-lg font-semibold mb-4">Excel 辅助识别</h3>
        <p class="text-gray-500 text-sm mb-4">上传 Excel 文件，自动识别第一行的列名。</p>
        <input type="file" id="excel-file" accept=".xlsx,.xls" class="w-full border rounded px-3 py-2 mb-4">
        <div id="excel-columns-result" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-2">识别到的列名（点击复制）：</label>
            <div id="excel-columns-list" class="flex flex-wrap gap-2"></div>
        </div>
        <div class="flex justify-end gap-2 mt-6">
            <button onclick="closeExcelUploadModal()" class="px-4 py-2 border rounded hover:bg-gray-50">关闭</button>
        </div>
    </div>
</div>

<script>
    let mappingsData = {};
    let editingSheet = null;

    document.addEventListener('DOMContentLoaded', function() { loadMappings(); setActiveNav('columns'); });

    async function loadMappings() {
        try {
            const res = await apiRequest('/api/config/sheet-column-mapping');
            if (res.success) { mappingsData = res.data; renderMappings(); }
            else { showToast('加载列映射失败', 'error'); }
        } catch (err) { showToast('加载列映射失败', 'error'); }
    }

    function renderMappings() {
        const container = document.getElementById('mappings-list');
        const entries = Object.entries(mappingsData);
        if (entries.length === 0) { container.innerHTML = '<p class="text-gray-500 text-center py-4">暂无 Sheet 映射配置</p>'; return; }
        container.innerHTML = entries.map(([name, config]) => `
            <div class="border rounded-lg p-4">
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <span class="font-medium">${name}</span>
                        <p class="text-sm text-gray-600 mt-1">输出列: ${(config.columns || []).join(', ')}</p>
                        <div class="mt-2 flex flex-wrap gap-1">
                            ${Object.entries(config.column_mapping || {}).map(([col, aliases]) => 
                                `<span class="tag">${col}: ${aliases.slice(0, 2).join(', ')}${aliases.length > 2 ? '...' : ''}</span>`
                            ).join('')}
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editSheet('${name}')" class="text-primary hover:text-blue-700">编辑</button>
                        <button onclick="deleteSheet('${name}')" class="text-danger hover:text-red-700">删除</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function showAddSheetModal() {
        editingSheet = null;
        document.getElementById('sheet-modal-title').textContent = '新增 Sheet 映射';
        document.getElementById('sheet-name').value = '';
        document.getElementById('sheet-columns').value = '';
        document.getElementById('sheet-mapping').value = '';
        document.getElementById('sheet-modal').classList.remove('hidden');
    }

    function closeSheetModal() { document.getElementById('sheet-modal').classList.add('hidden'); }

    function editSheet(name) {
        const config = mappingsData[name];
        if (!config) return;
        editingSheet = name;
        document.getElementById('sheet-modal-title').textContent = '编辑 Sheet 映射';
        document.getElementById('sheet-name').value = name;
        document.getElementById('sheet-columns').value = (config.columns || []).join(', ');
        const mappingLines = Object.entries(config.column_mapping || {}).map(([col, aliases]) => `${col}=${aliases.join(',')}`);
        document.getElementById('sheet-mapping').value = mappingLines.join('\n');
        document.getElementById('sheet-modal').classList.remove('hidden');
    }

    async function saveSheetMapping() {
        const name = document.getElementById('sheet-name').value.trim();
        if (!name) { showToast('请输入 Sheet 名称', 'error'); return; }
        const columnsStr = document.getElementById('sheet-columns').value.trim();
        const columns = columnsStr ? columnsStr.split(',').map(c => c.trim()).filter(c => c) : [];
        const mappingStr = document.getElementById('sheet-mapping').value.trim();
        const columnMapping = {};
        if (mappingStr) {
            mappingStr.split('\n').forEach(line => {
                const [col, aliasesStr] = line.split('=').map(s => s.trim());
                if (col && aliasesStr) {
                    columnMapping[col] = aliasesStr.split(',').map(a => a.trim()).filter(a => a);
                }
            });
        }
        const sheetConfig = { columns, column_mapping: columnMapping };
        try {
            const res = await apiRequest(`/api/config/sheet-column-mapping/${encodeURIComponent(name)}`, 'PUT', sheetConfig);
            if (res.success) { showToast('Sheet 映射保存成功', 'success'); closeSheetModal(); loadMappings(); }
            else { showToast(res.error || '保存失败', 'error'); }
        } catch (err) { showToast('保存失败', 'error'); }
    }

    function deleteSheet(name) {
        showConfirm('删除 Sheet 映射', `确定要删除 "${name}" 的列映射吗？`, async () => {
            try {
                const res = await apiRequest(`/api/config/sheet-column-mapping/${encodeURIComponent(name)}`, 'DELETE');
                if (res.success) { showToast('Sheet 映射已删除', 'success'); loadMappings(); }
                else { showToast(res.error || '删除失败', 'error'); }
            } catch (err) { showToast('删除失败', 'error'); }
        });
    }

    function showExcelUploadModal() {
        document.getElementById('excel-upload-modal').classList.remove('hidden');
        document.getElementById('excel-file').value = '';
        document.getElementById('excel-columns-result').classList.add('hidden');
    }

    function closeExcelUploadModal() { document.getElementById('excel-upload-modal').classList.add('hidden'); }

    document.getElementById('excel-file').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        try {
            const res = await fetch('/api/upload/excel', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) {
                document.getElementById('excel-columns-result').classList.remove('hidden');
                document.getElementById('excel-columns-list').innerHTML = data.columns.map(col =>
                    `<span class="tag cursor-pointer" onclick="navigator.clipboard.writeText('${col}'); showToast('已复制: ${col}')">${col}</span>`
                ).join('');
            } else { showToast(data.error || '解析失败', 'error'); }
        } catch (err) { showToast('上传失败', 'error'); }
    });
</script>
