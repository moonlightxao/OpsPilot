# ============================================================
# 风险检测配置（LLM 增强）
# ============================================================
risk_detection:
  enabled: true

  # 内置词库模式
  builtin:
    enabled: true                    # 是否启用内置词库
    custom_high_keywords: []         # 扩展高危关键词
    custom_medium_keywords: []       # 扩展中危关键词
    safe_keywords:                   # 白名单关键词
      - "备份"
      - "检查"
      - "查询"

  # LLM 深度分析
  llm:
    enabled: false                   # 是否启用 LLM
    provider: "ollama"               # openai | anthropic | ollama
    model: "qwen2.5:7b"              # 模型名称
    # api_key: ""                    # API 密钥（建议用环境变量）
    # base_url: ""                   # 自定义端点（Ollama 默认 http://localhost:11434）
    trigger_threshold: "medium"      # 低于此等级才触发 LLM 分析
    max_tokens: 500                  # 最大输出 token
    temperature: 0.1                 # 温度参数

  # 组合风险规则
  compound_rules:
    - keywords: ["批量", "删除"]
      level: "high"
      score: 95
    - keywords: ["生产", "修改"]
      level: "high"
      score: 90

# LLM 提供方预设配置（可选）
llm_providers:
  ollama:
    base_url: "http://localhost:11434"
    default_model: "qwen2.5:7b"
  openai:
    # api_key 从环境变量 OPENAI_API_KEY 读取
    default_model: "gpt-4o-mini"
  anthropic:
    # api_key 从环境变量 ANTHROPIC_API_KEY 读取
    default_model: "claude-sonnet-4-6"
